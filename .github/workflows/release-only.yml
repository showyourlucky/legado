name: Release Build (App Only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
      versionL: ${{ steps.set-ver.outputs.versionL }}
      updateLog_updated: ${{ steps.updateLog.outputs.updated }}
      updateLog_content: ${{ steps.updateLog.outputs.body }}
    steps:
      - id: set-ver
        run: |
          echo "version=$(date -d "8 hour" -u +3.%y.%m%d%H)" >> $GITHUB_OUTPUT
          echo "versionL=$(date -d "8 hour" -u +3.%y.%m%d%H%M)" >> $GITHUB_OUTPUT

      - id: updateLog
        run: |
          UPDATED_CONTENT=""
          if [ -f "app/src/main/assets/updateLog.md" ]; then
            UPDATED_CONTENT=$(awk '
            /^\*\*20/ && !found {
              found=1
            }
            found {
              if (NF == 0) exit
              print
            }
            ' app/src/main/assets/updateLog.md)
            if [ -z "$UPDATED_CONTENT" ]; then
              UPDATED_CONTENT=$(head -n 10 app/src/main/assets/updateLog.md)
            fi
          fi

          if [ -z "$UPDATED_CONTENT" ]; then
            UPDATED_CONTENT=$(git log -1 --pretty=%B 2>/dev/null || echo "Release Build")
          fi

          CONTENT_JSON=$(echo "$UPDATED_CONTENT" | jq -Rs . 2>/dev/null || echo "\"Error generating update content\"")
          echo "body=$CONTENT_JSON" >> $GITHUB_OUTPUT

      - id: set-update
        run: |
          if [ -n "$UPDATED_CONTENT" ]; then
            echo "updated=yes" >> $GITHUB_OUTPUT
          else
            echo "updated=no" >> $GITHUB_OUTPUT
          fi
        env:
          UPDATED_CONTENT: ${{ steps.updateLog.outputs.body }}

  build:
    needs: prepare
    strategy:
      matrix:
        product: [app]
        type: [release, releaseS]
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      product: ${{ matrix.product }}
      type: ${{ matrix.type }}
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSIONL: ${{ needs.prepare.outputs.versionL }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Release Apk Sign
        run: |
          echo "给apk增加签名"
          cp $GITHUB_WORKSPACE/.github/workflows/legado.jks $GITHUB_WORKSPACE/app/legado.jks
          echo "" >> $GITHUB_WORKSPACE/gradle.properties
          echo "RELEASE_STORE_FILE=./legado.jks" >> $GITHUB_WORKSPACE/gradle.properties
          echo "RELEASE_KEY_ALIAS=legado" >> $GITHUB_WORKSPACE/gradle.properties
          echo "RELEASE_STORE_PASSWORD=gedoor_legado" >> $GITHUB_WORKSPACE/gradle.properties
          echo "RELEASE_KEY_PASSWORD=gedoor_legado" >> $GITHUB_WORKSPACE/gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build With Gradle
        continue-on-error: true
        run: |
          if [ "${{ env.type }}" == 'release' ]; then
            typeName="原包名"
          else
            typeName="共存"
            sed "s/'.release'/'.releaseS'/" $GITHUB_WORKSPACE/app/build.gradle -i
          fi
          echo "统一版本号"
          sed "/def version/c def version = \"${{ env.VERSION }}\"" $GITHUB_WORKSPACE/app/build.gradle -i
          echo "开始${{ env.product }}$typeName构建"
          chmod +x gradlew
          ./gradlew assemble${{ env.product }}release --build-cache --parallel --daemon --warning-mode all
          echo "修改APK文件名"
          mkdir -p ${{ github.workspace }}/apk/
          for file in `ls ${{ github.workspace }}/app/build/outputs/apk/*/*/*.apk`; do
            if [ "${{ env.type }}" == 'release' ]; then
              mv "$file" ${{ github.workspace }}/apk/legado_正式版_${{ env.VERSIONL }}_$typeName.apk
            else
              mv "$file" ${{ github.workspace }}/apk/legado_S版_${{ env.VERSIONL }}_$typeName.apk
            fi
          done

      - name: Check Build production
        run: |
          if [ ! -d ${{ github.workspace }}/apk ]; then
            echo "Build production not found! Check gradle logs."
            exit 1
          fi
          cd ${{ github.workspace }}/apk/
          if [ ! -e legado_*.apk ]; then
            echo "Build production not found! Check gradle logs."
            exit 1
          fi

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.type }}
          if-no-files-found: ignore
          path: ${{ github.workspace }}/apk/*.apk

  prerelease:
    needs: [prepare, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@v8
        with:
          path: apk/

      - working-directory: apk/
        run: |
          mv */*.apk .
          rm -rf */

          for file in `ls *.apk`; do
            if [[ "$file" == *原包名* ]]; then
              mv "$file" $(echo $file | sed -e s/原包名/release/ -e s/正式版/beta/)
            else
              mv "$file" $(echo $file | sed -e s/共存/releaseS/ -e s/S版/plus/)
            fi
          done

      - name: Publish Official Release
        if: needs.prepare.outputs.updateLog_updated == 'yes'
        uses: softprops/action-gh-release@v2
        with:
          name: legado_app_${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body: |
            ### 更新内容
            ${{ fromJSON(needs.prepare.outputs.updateLog_content) }}
          prerelease: false
          files: ${{ github.workspace }}/apk/*.apk
          fail_on_unmatched_files: true

      - name: Publish Pre-Release
        if: needs.prepare.outputs.updateLog_updated != 'yes'
        uses: softprops/action-gh-release@v2
        with:
          name: legado_app_${{ env.VERSION }}
          tag_name: beta
          body: |
            ### 更新内容
            ${{ fromJSON(needs.prepare.outputs.updateLog_content) }}
          prerelease: true
          files: ${{ github.workspace }}/apk/*.apk
          fail_on_unmatched_files: true

      - name: Push To Release Branch
        if: needs.prepare.outputs.updateLog_updated == 'yes'
        run: |
          cd ${{ github.workspace }}/apk/
          git init
          git checkout -b release
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://${{ github.actor }}:${{ secrets.ACTIONS_TOKEN }}@github.com/${{ github.actor }}/release"
          git add *.apk
          git commit -m "${{ env.VERSION }}"
          git push -f -u origin release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}