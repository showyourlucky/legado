name: Build & Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Configure signing
        run: |
          cp .github/workflows/show-release-key.jks app/show-release-key.jks
          echo "" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
          echo "RELEASE_STORE_FILE=./app/show-release-key.jks" >> gradle.properties

      - name: Build app release APK
        run: ./gradlew assembleAppRelease --parallel --daemon

      - name: Find APK files
        run: find app/build/outputs/apk -name "*.apk" -type f

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Legado v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/app/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}